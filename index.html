<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stundenplan">
<meta name="theme-color" content="#080808">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080808'/><text y='75' x='10' font-size='75'>📚</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080808'/><text y='75' x='10' font-size='75'>📚</text></svg>">
<meta name="mobile-web-app-capable" content="yes">
<title>Stundenplan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #080808;
    color: #ede9fe;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: #080808;
    padding: 16px 14px 10px;
    border-bottom: 1px solid #1a1a1a;
  }

  .header-title {
    font-family: Georgia, serif;
    font-size: 22px;
    margin-bottom: 12px;
  }

  .header-title span {
    background: linear-gradient(135deg, #a78bfa, #e879f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .day-tabs {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    background: #0f0f0f;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .day-tab.active {
    background: linear-gradient(135deg, #7c3aed33, #a855f733);
    border-color: #7c3aed;
  }

  .day-tab .tab-name {
    font-size: 12px;
    color: #c4b5fd;
    display: block;
  }

  .day-tab:not(.active) .tab-name { color: #555568; }

  .day-tab .tab-count {
    font-size: 9px;
    color: #555568;
    display: block;
    margin-top: 1px;
  }

  .day-tab.today { border-color: #e879f9 !important; }
  .day-tab.today .tab-name { color: #f0abfc !important; }

  .content { padding: 14px; }

  .day-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #555568;
    margin-bottom: 12px;
  }

  .day-label span {
    color: #e879f9;
  }

  /* Course Card */
  .course-card {
    background: #0f0f0f;
    border: 1px solid #1e1e1e;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }

  .course-card.done {
    opacity: 0.5;
    border-color: #2d1f4a;
  }

  .course-card.done .course-name {
    text-decoration: line-through;
    color: #555568 !important;
  }

  .course-header {
    display: flex;
    align-items: stretch;
    cursor: pointer;
    padding: 12px 14px;
    gap: 12px;
  }

  .course-time-block {
    flex-shrink: 0;
    text-align: center;
    min-width: 52px;
  }

  .course-time {
    font-size: 11px;
    color: #a78bfa;
    font-weight: 600;
    line-height: 1.4;
  }

  .course-type-badge {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
    padding: 2px 6px;
    border-radius: 10px;
    display: inline-block;
  }

  .badge-vorlesung { background: #1e1a35; color: #a78bfa; }
  .badge-seminar   { background: #1a2614; color: #86efac; }
  .badge-kurs      { background: #1a1a2e; color: #67e8f9; }
  .badge-tutorium  { background: #2a1a10; color: #fde68a; }
  .badge-praktikum { background: #2a1018; color: #fda4af; }

  .course-info { flex: 1; min-width: 0; }

  .course-name {
    font-family: Georgia, serif;
    font-size: 14px;
    color: #ede9fe;
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .course-room {
    font-size: 10px;
    color: #555568;
  }

  .course-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .check-btn {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: 2px solid #2a2a2a;
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .check-btn.checked {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border-color: #7c3aed;
  }

  .check-btn .check-icon { color: #fff; font-size: 13px; font-weight: 700; }

  .expand-btn {
    color: #555568;
    font-size: 16px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    transition: transform 0.2s;
  }

  .expand-btn.open { transform: rotate(180deg); }

  /* Notes section */
  .course-notes-section {
    border-top: 1px solid #1a1a1a;
    padding: 12px 14px;
  }

  .notes-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #555568;
    margin-bottom: 6px;
  }

  .notes-input {
    width: 100%;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 8px 10px;
    color: #ede9fe;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    resize: none;
    height: 60px;
    box-sizing: border-box;
    line-height: 1.5;
  }

  .notes-input:focus { border-color: #7c3aed; }

  .notes-input::placeholder { color: #333; }

  /* Empty state */
  .empty-day {
    text-align: center;
    padding: 40px 20px;
    color: #333;
    font-size: 13px;
  }

  /* Current time indicator */
  .now-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #e879f920;
    border: 1px solid #e879f9;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 9px;
    color: #f0abfc;
    margin-left: 8px;
    vertical-align: middle;
  }

  .now-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #e879f9;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .stat-chip {
    background: #0f0f0f;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 10px;
    color: #555568;
    flex: 1;
    text-align: center;
  }

  .stat-chip strong {
    display: block;
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #e879f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Stunden<span>plan</span></div>
  <div class="day-tabs" id="dayTabs"></div>
</div>

<div class="content" id="content"></div>

<script>
const DAYS = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag"];
const DAY_SHORT = ["Mo", "Di", "Mi", "Do", "Fr"];

const schedule = {
  Montag: [
    { id: "mo1", time: "08:15–09:45", name: "Organische Chemie I", room: "53522 Vorlesung", type: "vorlesung" },
    { id: "mo2", time: "10:15–11:45", name: "Grundl. Molekularbiologie", room: "54141 Vorlesung", type: "vorlesung", note: "Studienbeginn ab WS 24/25" },
    { id: "mo3", time: "13:00–14:00", name: "Formkenntnis & Systematik der Tiere", room: "54104 Vorlesung", type: "vorlesung" },
    { id: "mo4", time: "14:00–19:00", name: "Formkenntnis & Systematik der Tiere", room: "54105 Kurs · Zug 1: 14:00–16:15 · Zug 2: 16:30–18:45", type: "kurs" },
  ],
  Dienstag: [
    { id: "di1", time: "08:00–09:30", name: "Tutorien Organische Chemie", room: "Uhrzeit bitte prüfen", type: "tutorium" },
    { id: "di2", time: "10:15–11:45", name: "Anorganische Chemie", room: "53306 Seminar (1. Sem. Hälfte)", type: "seminar" },
  ],
  Mittwoch: [
    { id: "mi1", time: "09:15–10:45", name: "Biologische Physik", room: "54007 Vorlesung", type: "vorlesung" },
    { id: "mi2", time: "11:00–12:00", name: "F&S Pflanzen", room: "54107 Vorlesung", type: "vorlesung" },
  ],
  Donnerstag: [
    { id: "do1", time: "08:15–09:45", name: "Organische Chemie I", room: "53522 Vorlesung", type: "vorlesung" },
    { id: "do2", time: "10:15–11:45", name: "Anorg. Chemie", room: "53306 Seminar (1)", type: "seminar" },
    { id: "do3", time: "10:15–11:45", name: "Org. Chemie", room: "53016 Seminar (2)", type: "seminar" },
  ],
  Freitag: [
    { id: "fr1", time: "08:00–09:30", name: "Tutorien Organische Chemie", room: "Uhrzeit bitte prüfen", type: "tutorium" },
    { id: "fr2", time: "10:15–11:45", name: "Ökologie", room: "54103 Vorlesung", type: "vorlesung" },
    { id: "fr3", time: "12:30–17:00", name: "Formkenntnis & Systematik der Pflanzen", room: "54108 Kurs · Zug 1: 12:30–14:30 · Zug 2: 15:00–17:00", type: "kurs" },
  ],
};

// State
let activeDay = getTodayIndex();
let expanded = {};
let checked = JSON.parse(localStorage.getItem("checked") || "{}");
let notes = JSON.parse(localStorage.getItem("notes") || "{}");

function getTodayIndex() {
  const d = new Date().getDay(); // 0=Sun, 1=Mon...
  if (d === 0 || d === 6) return 0; // weekend → show Monday
  return d - 1;
}

function isCurrentCourse(time) {
  const now = new Date();
  const hm = now.getHours() * 60 + now.getMinutes();
  const parts = time.split("–");
  if (parts.length < 2) return false;
  const [sh, sm] = parts[0].split(":").map(Number);
  const [eh, em] = parts[1].split(":").map(Number);
  return hm >= sh * 60 + sm && hm <= eh * 60 + em;
}

function saveState() {
  localStorage.setItem("checked", JSON.stringify(checked));
  localStorage.setItem("notes", JSON.stringify(notes));
}

function render() {
  renderTabs();
  renderContent();
}

function renderTabs() {
  const todayIdx = getTodayIndex();
  const container = document.getElementById("dayTabs");
  container.innerHTML = DAYS.map((day, i) => {
    const courses = schedule[day] || [];
    const done = courses.filter(c => checked[c.id]).length;
    const isToday = i === todayIdx;
    const isActive = i === activeDay;
    return `<button class="day-tab ${isActive ? "active" : ""} ${isToday ? "today" : ""}" onclick="switchDay(${i})">
      <span class="tab-name">${DAY_SHORT[i]}</span>
      <span class="tab-count">${done}/${courses.length}</span>
    </button>`;
  }).join("");
}

function renderContent() {
  const day = DAYS[activeDay];
  const todayIdx = getTodayIndex();
  const courses = schedule[day] || [];
  const isToday = activeDay === todayIdx;
  const done = courses.filter(c => checked[c.id]).length;

  let html = `<div class="day-label">${day}${isToday ? ' <span>· Heute</span>' : ''}</div>`;

  html += `<div class="stats-bar">
    <div class="stat-chip"><strong>${courses.length}</strong>Kurse</div>
    <div class="stat-chip"><strong>${done}</strong>Erledigt</div>
    <div class="stat-chip"><strong>${courses.length - done}</strong>Offen</div>
  </div>`;

  if (courses.length === 0) {
    html += `<div class="empty-day">🎉 Keine Kurse heute!</div>`;
  } else {
    courses.forEach(course => {
      const isDone = !!checked[course.id];
      const isOpen = !!expanded[course.id];
      const isCurrent = isToday && isCurrentCourse(course.time);
      const noteVal = notes[course.id] || "";

      html += `<div class="course-card ${isDone ? "done" : ""}" id="card-${course.id}">
        <div class="course-header">
          <div class="course-time-block">
            <div class="course-time">${course.time.replace("–", "\n")}</div>
            <div class="course-type-badge badge-${course.type}">${course.type}</div>
          </div>
          <div class="course-info">
            <div class="course-name">${course.name}${isCurrent ? '<span class="now-badge"><span class="now-dot"></span>Jetzt</span>' : ''}</div>
            <div class="course-room">${course.room}</div>
            ${course.note ? `<div style="font-size:10px;color:#fde68a;margin-top:3px;">⚠️ ${course.note}</div>` : ""}
          </div>
          <div class="course-actions">
            <button class="check-btn ${isDone ? "checked" : ""}" onclick="toggleCheck('${course.id}')">
              ${isDone ? '<span class="check-icon">✓</span>' : ""}
            </button>
            <button class="expand-btn ${isOpen ? "open" : ""}" onclick="toggleExpand('${course.id}')">⌄</button>
          </div>
        </div>
        ${isOpen ? `
        <div class="course-notes-section">
          <div class="notes-label">📝 Notizen</div>
          <textarea class="notes-input" placeholder="Hausaufgaben, To-Dos, Infos..." 
            onchange="saveNote('${course.id}', this.value)"
            oninput="saveNote('${course.id}', this.value)">${noteVal}</textarea>
        </div>` : ""}
      </div>`;
    });
  }

  document.getElementById("content").innerHTML = html;
}

function switchDay(i) {
  activeDay = i;
  render();
  window.scrollTo(0, 0);
}

function toggleCheck(id) {
  checked[id] = !checked[id];
  saveState();
  render();
}

function toggleExpand(id) {
  expanded[id] = !expanded[id];
  renderContent();
}

function saveNote(id, val) {
  notes[id] = val;
  saveState();
}

// Auto-switch to today on load
render();

// Refresh every minute for "Jetzt" indicator
setInterval(() => renderContent(), 60000);
</script>
</body>
</html>
